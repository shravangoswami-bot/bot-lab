name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid semver in package.json: $VERSION"
            exit 1
          fi
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release tag exists
        id: tag_check
        run: |
          git fetch --tags --force
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists. Skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate scripts
        if: steps.tag_check.outputs.exists == 'false'
        run: npm test

      - name: Pack release assets
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          mkdir -p dist/bot-lab
          cp README.md install.sh uninstall.sh package.json dist/bot-lab/
          cp LICENSE dist/bot-lab/
          mkdir -p dist/bot-lab/scripts
          cp scripts/botlab dist/bot-lab/scripts/
          cp scripts/botlab dist/botlab
          chmod +x dist/botlab dist/bot-lab/scripts/botlab
          tar -C dist -czf "bot-lab-${{ steps.version.outputs.tag }}.tar.gz" bot-lab

      - name: Tag and release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            dist/botlab \
            "bot-lab-${{ steps.version.outputs.tag }}.tar.gz" \
            install.sh \
            uninstall.sh
